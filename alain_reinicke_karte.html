const map = L.map('map').setView([50.85, 12.95], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap-Mitwirkende',
  maxZoom: 19
}).addTo(map);

const grouped = {};
listings.forEach(l => {
  const key = l.adresse ? (l.adresse + ", " + (l.ort||"")) : l.ort;
  grouped[key] = grouped[key] || [];
  grouped[key].push(l);
});

let bounds = [];
Object.keys(grouped).forEach(key => {
  const group = grouped[key];
  group.forEach((l, i) => {
    const exact = l.adresse && adressen[l.adresse];
    const base = exact || orte[l.ort];
    if (!base) { return; }
    const pos = (!exact && group.length > 1) ? jitter(base, i) : base;
    bounds.push(pos);
    const color = colors[l.typ] || "#555";
    const marker = L.circleMarker(pos, {
      radius: 9, color: "#222", weight: 1, fillColor: color, fillOpacity: 0.9
    }).addTo(map);

    const preisText = l.preis ? (l.kauf_oder_miete === "Miete" ? l.preis.toLocaleString("de-DE") + " € / Monat" : l.preis.toLocaleString("de-DE") + " €") : "auf Anfrage";

    const html = `
      <div class="popup-title">${l.titel}</div>
      <table class="popup-table">
        <tr><td>Art der Immobilie:</td><td>${l.typ}${l.kauf_oder_miete ? " ("+l.kauf_oder_miete+")" : ""}</td></tr>
        <tr><td>Wohnfläche:</td><td>${l.wohnflaeche_m2 != null ? l.wohnflaeche_m2 + " m²" : "k.A."}</td></tr>
        <tr><td>Zimmer:</td><td>${l.zimmer != null ? l.zimmer : "k.A."}</td></tr>
        <tr><td>Grundstück:</td><td>${l.grundstueck_m2 != null ? l.grundstueck_m2.toLocaleString("de-DE") + " m²" : "k.A."}</td></tr>
        <tr><td>Preis:</td><td>${preisText}</td></tr>
        <tr><td>Ort:</td><td>${l.adresse ? l.adresse + ", " : ""}${l.ort}${l.plz ? " ("+l.plz+")" : ""}</td></tr>
      </table>
      ${exact ? '<div class="approx">Geocodierte Straßenadresse (Nominatim/OpenStreetMap)</div>' : '<div class="approx">Ungefähre Lage (Ort/Stadtteil, keine genaue Adresse im Exposé)</div>'}
      ${l.url ? `<a class="expose-link" href="${l.url}" target="_blank">Exposé öffnen →</a>` : ""}
    `;
    marker.bindPopup(html);
  });
});

if (bounds.length) {
  map.fitBounds(bounds, { padding: [40,40] });
}

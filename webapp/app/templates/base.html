<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Grundstücks-Übersicht</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; color: #222; }
    header { background: #1c3d5a; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    header a { color: white; text-decoration: none; font-size: 14px; }
    main { padding: 20px; }
    table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
    th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
    th { background: #eef2f6; position: sticky; top: 0; }
    tr.expired { background: #f4cccc; }
    .filters { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .filters input, .filters select { padding: 6px; }
    button, .btn { background: #1c3d5a; color: white; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; }
    button:hover, .btn:hover { background: #15304a; }
    .status-pill { padding: 2px 8px; border-radius: 10px; font-size: 12px; background: #ddd; }
    a.link { color: #1c3d5a; }
    #update-status { margin-top: 16px; background: white; padding: 10px; border-radius: 4px; font-size: 12px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>
  <header>
    <strong>Grundstücks-Übersicht</strong>
    {% if request.cookies.get('gs_session') %}
      <a href="/logout">Logout</a>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>

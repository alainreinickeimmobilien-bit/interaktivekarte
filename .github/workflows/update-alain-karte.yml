name: Alain Reinicke Karte aktualisieren

on:
  schedule:
    # täglich um 05:00 UTC (= 06:00/07:00 Uhr deutscher Zeit)
    - cron: "0 5 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "alain_reinicke_system/**"
      - ".github/workflows/update-alain-karte.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Karte neu bauen
        run: python3 alain_reinicke_system/scrape_and_build.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html alain_reinicke_system/geocode_cache.json
          git diff --staged --quiet || git commit -m "Automatisches Update der Alain-Reinicke-Karte"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages-Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
